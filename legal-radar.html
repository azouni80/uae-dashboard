<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE Legal Radar | Regulatory Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1B2A;color:#E8EDF2;font-family:'Source Sans 3',sans-serif;overflow-x:hidden;}
a{color:var(--aujan);text-decoration:none;}a:hover{color:var(--aujan-lt);text-decoration:underline;}
::-webkit-scrollbar{width:6px;background:#0D1B2A;}::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:3px;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes panelSlide{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* Layout */
.dashboard{display:flex;flex-direction:column;min-height:100vh;}
.header{background:#060E17;border-bottom:1px solid #1E3A5F;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;gap:16px;}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:228px;background:#060E17;border-right:1px solid #1E3A5F;padding:20px 16px;flex-shrink:0;overflow-y:auto;height:calc(100vh - 56px);position:sticky;top:56px;}
.content{flex:1;overflow-y:auto;padding:20px 24px;height:calc(100vh - 56px);}

/* Aujan brand palette */
:root{
  --aujan:#2626F0;        /* Aujan primary blue */
  --aujan-lt:#4B4BFF;     /* lighter blue for hover states */
  --aujan-dim:rgba(38,38,240,.15);
  --aujan-faint:rgba(38,38,240,.08);
  --aujan-border:rgba(38,38,240,.3);
}
/* Header — 3-column: nav | brand centre | controls */
.header{justify-content:space-between;}
.header-nav{display:flex;gap:4px;flex-shrink:0;}
.header-brand{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;text-align:center;}
.aujan-logo-svg{height:38px;width:auto;}
.header-brand-sub{font-size:9px;color:#7090B8;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}

/* Nav */
.nav-tabs{display:flex;gap:4px;}
.nav-btn{background:transparent;color:#9FB3C8;border:none;cursor:pointer;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;letter-spacing:.02em;transition:all .2s;white-space:nowrap;}
.nav-btn.active{background:var(--aujan);color:#fff;}
.nav-btn:hover:not(.active){background:#1E3A5F;color:#E8EDF2;}
/* Sector dropdown */
.nav-dropdown-wrap{position:relative;display:inline-block;}
.nav-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#0D1B2A;border:1px solid #1E3A5F;border-radius:8px;min-width:200px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;animation:slideIn .15s ease;}
.nav-dropdown-item{display:block;width:100%;text-align:left;padding:9px 16px;border:none;background:transparent;color:#9FB3C8;cursor:pointer;font-size:12px;font-family:'Source Sans 3',sans-serif;font-weight:500;border-bottom:1px solid rgba(255,255,255,.04);transition:all .15s;}
.nav-dropdown-item:last-child{border-bottom:none;}
.nav-dropdown-item:hover{background:var(--aujan-dim);color:var(--aujan-lt);}
.nav-dropdown-item.all{color:#E8EDF2;font-weight:700;}
.nav-dropdown-item .sector-dot{width:7px;height:7px;border-radius:50%;background:var(--aujan);display:inline-block;margin-right:8px;}

/* Header right */
.unread-badge{background:#E63946;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:none;}
.unread-badge:hover{background:#c0392b;}
.live-indicator{display:flex;align-items:center;gap:7px;}
.live-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;display:inline-block;}
.live-dot.fresh{background:#2EC4B6;}.live-dot.stale{background:var(--aujan-lt);}
.countdown-txt{font-size:11px;color:#9FB3C8;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.refresh-btn{background:#1E3A5F;color:var(--aujan-lt);border:1px solid var(--aujan-border);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .2s;white-space:nowrap;}
.refresh-btn:hover{background:var(--aujan-dim);border-color:var(--aujan);}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed;}
.spin{display:inline-block;animation:spin .8s linear infinite;}

/* Sidebar */
.filter-label{font-size:9px;color:#4A6FA5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block;}
.filter-section{margin-bottom:18px;}
.filter-btn{width:100%;background:transparent;color:#9FB3C8;border:none;cursor:pointer;text-align:left;padding:5px 8px;border-radius:4px;font-size:11px;font-weight:400;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.filter-btn:hover{background:#1E3A5F22;color:#E8EDF2;}
.filter-btn.active{background:var(--aujan-dim);color:var(--aujan-lt);font-weight:600;border-left:2px solid var(--aujan);}
.search-input{width:100%;background:#0D1B2A;border:1px solid #1E3A5F;border-radius:6px;padding:7px 10px;color:#E8EDF2;font-size:12px;margin-bottom:16px;outline:none;font-family:'Source Sans 3',sans-serif;}
.search-input:focus{border-color:rgba(38,38,240,.35);}
.search-input::placeholder{color:#4A6FA5;}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0D1B2A;}
.stat-label{font-size:11px;color:#9FB3C8;}
.stat-value{font-size:12px;font-weight:700;color:var(--aujan);font-family:'IBM Plex Mono',monospace;}
.sidebar-divider{border-top:1px solid #1E3A5F;margin:16px 0;}

/* Update cards — fully clickable */
.update-card{background:#112030;border:1px solid #1E3A5F;border-left:3px solid #1E3A5F44;border-radius:8px;padding:16px 20px;transition:all .2s;cursor:pointer;position:relative;}
.update-card:hover{border-color:rgba(38,38,240,.4);box-shadow:0 4px 20px rgba(38,38,240,.12);transform:translateY(-1px);}
.update-card.unread{border-color:rgba(38,38,240,.27);border-left-color:var(--aujan);box-shadow:0 0 12px rgba(38,38,240,.13);animation:slideIn .3s ease;}
.update-card.compact{padding:12px 16px;}
.update-card .click-hint{position:absolute;bottom:12px;right:16px;font-size:10px;color:#2E4A6A;font-weight:500;transition:color .2s;}
.update-card:hover .click-hint{color:var(--aujan);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.card-body{flex:1;min-width:0;}
.card-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.tag{padding:1px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.05em;display:inline-block;}
.tag-hi{background:#E63946;color:#fff;}.tag-med{background:#2626F0;color:#fff;}.tag-lo{background:#3A4A5A;color:#9FB3C8;}
.tag-amend{background:#2A1A3A;color:#A78BFA;}
.tag-new{background:#0D2A1A;color:#2EC4B6;animation:pulse 2s infinite;}
.tag-type{background:#1E3A5F;}
.card-ref{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4A6FA5;margin-bottom:5px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#E8EDF2;line-height:1.3;margin-bottom:6px;}
.card-title.sm{font-size:16px;}
.card-summary{font-size:12px;color:#9FB3C8;line-height:1.6;margin-bottom:10px;}
.card-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.card-meta span{font-size:11px;color:#4A6FA5;}
.card-list{display:flex;flex-direction:column;gap:12px;}

/* Source cards */
.source-card{background:#112030;border:1px solid #1E3A5F;border-radius:8px;padding:16px 18px;display:flex;flex-direction:column;gap:10px;transition:all .2s;}
.source-card:hover{border-color:#3498db55;box-shadow:0 4px 16px rgba(52,152,219,.1);}
.source-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.source-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.tier-badge{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.1em;}
.update-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--aujan);font-weight:700;}
.source-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#E8EDF2;margin-bottom:3px;}
.source-scope{font-size:11px;color:#4A6FA5;}
.sector-tags{display:flex;flex-wrap:wrap;gap:5px;}
.sector-tag{background:#1E3A5F;color:#9FB3C8;padding:1px 8px;border-radius:3px;font-size:10px;}
.source-footer{border-top:1px solid #1E3A5F;padding-top:10px;display:flex;justify-content:space-between;align-items:center;}
.last-fetched{font-size:10px;color:#4A6FA5;}
.tier-section{margin-bottom:28px;}
.tier-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tier-stripe{width:3px;height:20px;border-radius:2px;display:inline-block;flex-shrink:0;}
.tier-label-txt{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;border:none;transition:all .2s;white-space:nowrap;}
.btn-gold{background:var(--aujan);color:#fff;}.btn-gold:hover{background:var(--aujan-lt);color:#fff;text-decoration:none;}
.btn-outline{background:#1E3A5F;color:var(--aujan-lt);border:1px solid var(--aujan-border);}.btn-outline:hover{background:var(--aujan-dim);color:#fff;text-decoration:none;}
.btn-ghost{background:transparent;color:#9FB3C8;border:1px solid #1E3A5F;}.btn-ghost:hover{border-color:#9FB3C8;color:#E8EDF2;text-decoration:none;}
.btn-sm{padding:5px 12px;font-size:11px;}

/* Live feed */
.live-section{background:#0A1929;border:1px solid #1E3A5F;border-left:3px solid #2EC4B6;border-radius:8px;padding:16px 20px;margin-bottom:20px;}
.live-section-hdr{display:flex;align-items:center;gap:8px;font-size:10px;color:#2EC4B6;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px;}
.live-dot-sm{width:7px;height:7px;border-radius:50%;background:#2EC4B6;display:inline-block;animation:pulse 2s infinite;}
.live-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.live-item:last-child{border-bottom:none;padding-bottom:0;}
.live-item a{color:#E8EDF2;font-weight:500;font-size:12px;display:block;line-height:1.4;}
.live-item a:hover{color:var(--aujan);text-decoration:none;}
.live-item-meta{font-size:10px;color:#4A6FA5;margin-top:3px;}
.live-item-src{color:#2EC4B6;}
.live-placeholder{color:#4A6FA5;font-size:12px;text-align:center;padding:12px 0;}

/* Page titles */
.page-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#E8EDF2;}
.page-sub{font-size:12px;color:#4A6FA5;margin-top:2px;}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.section-sub-label{font-size:10px;color:#4A6FA5;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.sector-group{margin-bottom:28px;}
.sector-group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sector-group-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:#E8EDF2;}
.sector-count-badge{background:#1E3A5F;color:var(--aujan);border-radius:20px;padding:1px 10px;font-size:11px;font-weight:700;}
.empty-state{color:#4A6FA5;font-size:13px;text-align:center;padding:40px;}

/* ===== DETAIL PANEL ===== */
.panel-overlay{position:fixed;inset:0;background:rgba(6,14,23,.7);z-index:200;animation:fadeIn .2s ease;backdrop-filter:blur(2px);}
.detail-panel{position:fixed;top:0;right:0;width:520px;max-width:95vw;height:100vh;background:#0D1B2A;border-left:1px solid #1E3A5F;z-index:201;overflow-y:auto;animation:panelSlide .25s ease;display:flex;flex-direction:column;}
.panel-topbar{background:#060E17;border-bottom:1px solid #1E3A5F;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:1;}
.panel-topbar-left{font-size:10px;color:#4A6FA5;letter-spacing:.1em;text-transform:uppercase;}
.panel-close{background:transparent;border:1px solid #1E3A5F;color:#9FB3C8;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.panel-close:hover{border-color:#E63946;color:#E63946;}
.panel-body{padding:24px 24px 40px;flex:1;}
.panel-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.panel-ref{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4A6FA5;margin-bottom:8px;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:#E8EDF2;line-height:1.3;margin-bottom:14px;}
.panel-meta-row{display:flex;gap:20px;flex-wrap:wrap;padding:12px 0;border-top:1px solid #1E3A5F;border-bottom:1px solid #1E3A5F;margin-bottom:16px;}
.panel-meta-item{display:flex;flex-direction:column;gap:3px;}
.panel-meta-label{font-size:9px;color:#4A6FA5;text-transform:uppercase;letter-spacing:.1em;}
.panel-meta-value{font-size:13px;color:#E8EDF2;font-weight:600;}
.panel-section-title{font-size:10px;color:#4A6FA5;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:20px;}
.panel-summary{font-size:13px;color:#9FB3C8;line-height:1.7;}
.panel-deadline{background:rgba(230,126,34,.08);border:1px solid rgba(230,126,34,.25);border-radius:6px;padding:12px 14px;margin-top:16px;}
.panel-deadline-label{font-size:9px;color:#e67e22;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:4px;}
.panel-deadline-txt{font-size:13px;color:#E8EDF2;line-height:1.5;}
.panel-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.panel-news-item{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.panel-news-item:last-child{border-bottom:none;}
.panel-news-item a{color:#E8EDF2;font-size:12px;font-weight:500;display:block;line-height:1.4;}
.panel-news-item a:hover{color:var(--aujan);text-decoration:none;}
.panel-news-meta{font-size:10px;color:#4A6FA5;margin-top:2px;}
.panel-no-news{font-size:12px;color:#4A6FA5;font-style:italic;padding:8px 0;}
.panel-divider{border-top:1px solid #1E3A5F;margin:20px 0;}

@media(max-width:900px){.sidebar{display:none;}.content{padding:16px;}.detail-panel{width:100vw;}}
</style>
</head>
<body>
<div class="dashboard">

  <!-- ===== HEADER ===== -->
  <div class="header">

    <!-- LEFT: Navigation -->
    <div class="header-nav">
      <button class="nav-btn active" id="btnFeed"    onclick="setView('feed')">📋 Feed</button>
      <button class="nav-btn"        id="btnSources" onclick="setView('sources')">🔗 Sources</button>
      <div class="nav-dropdown-wrap" id="sectorDropdownWrap">
        <button class="nav-btn" id="btnSectors" onclick="toggleSectorDropdown(event)">📂 By Sector ▾</button>
        <div class="nav-dropdown" id="sectorDropdown" style="display:none"></div>
      </div>
    </div>

    <!-- CENTRE: Brand -->
    <div class="header-brand">
      <!-- Aujan logo — inline SVG replicating brand identity -->
      <svg class="aujan-logo-svg" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg" aria-label="Aujan Group Holding">
        <!-- Arabic: العوجان -->
        <text x="110" y="20" text-anchor="middle" font-size="17" font-weight="800"
              fill="#2626F0" font-family="'Segoe UI','Arial',sans-serif" letter-spacing="1">العوجان</text>
        <!-- Latin: AUJAN -->
        <text x="110" y="36" text-anchor="middle" font-size="16" font-weight="800"
              fill="#2626F0" font-family="'Segoe UI','Arial Black',sans-serif" letter-spacing="3">AUJAN</text>
        <!-- EST. 1905 -->
        <text x="110" y="44" text-anchor="middle" font-size="7" font-weight="500"
              fill="#7090B8" font-family="'Segoe UI','Arial',sans-serif" letter-spacing="2">EST. 1905</text>
      </svg>
      <div style="margin-top:1px;">
        <div style="font-size:11px;font-weight:700;color:#E8EDF2;letter-spacing:.06em;white-space:nowrap;">UAE Legal Radar</div>
        <div class="header-brand-sub">Aujan Group Holding &nbsp;|&nbsp; Legal Department</div>
      </div>
    </div>
    <div class="header-right">
      <button class="unread-badge" id="unreadBadge" onclick="markAllRead()" style="display:none"></button>
      <div class="live-indicator">
        <span class="live-dot fresh" id="liveDot"></span>
        <span class="countdown-txt" id="countdownTxt">Next: 30:00</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="triggerRefresh()">↺ Refresh Now</button>
    </div>
  </div>

  <div class="body">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar" id="sidebar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search laws, refs, sectors…" oninput="onSearch(this.value)">

      <div class="filter-section">
        <span class="filter-label">Source</span>
        <button class="filter-btn active" id="srcAll" onclick="setFilter('src','all')">All Sources</button>
        <div id="sourceFilters"></div>
      </div>

      <div class="filter-section">
        <span class="filter-label">Impact</span>
        <button class="filter-btn active" id="impAll"    onclick="setFilter('imp','all')">All Impact</button>
        <button class="filter-btn"        id="impHigh"   onclick="setFilter('imp','High')">🔴 High</button>
        <button class="filter-btn"        id="impMedium" onclick="setFilter('imp','Medium')">🟡 Medium</button>
        <button class="filter-btn"        id="impLow"    onclick="setFilter('imp','Low')">⚪ Low</button>
      </div>

      <div class="filter-section">
        <span class="filter-label">Type</span>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#9FB3C8;padding:4px 0;">
          <input type="checkbox" id="amendFilter" onchange="setFilter('amend',this.checked)" style="accent-color:var(--aujan);">
          Amendments only
        </label>
      </div>

      <div class="sidebar-divider"></div>
      <div class="filter-section">
        <span class="filter-label">Quick Stats</span>
        <div id="quickStats"></div>
      </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="content" id="mainContent"></div>

  </div>
</div>

<!-- ===== DETAIL PANEL ===== -->
<div class="panel-overlay" id="panelOverlay" style="display:none" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel" style="display:none">
  <div class="panel-topbar">
    <span class="panel-topbar-left" id="panelBreadcrumb">Update Detail</span>
    <button class="panel-close" onclick="closePanel()">✕ Close</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ===== DATA =====
const SOURCES = [
  { id:"uae-legislation", name:"UAE Legislation Platform",    authority:"Cabinet Secretariat", tier:1, scope:"Federal",             url:"https://uaelegislation.gov.ae/en",                              sectors:["All Federal Law"],                count:14, lastFetch:"—" },
  { id:"moj",             name:"Ministry of Justice",         authority:"MOJ",                 tier:1, scope:"Federal",             url:"https://www.moj.gov.ae/en/laws-and-legislation.aspx",           sectors:["Civil","Criminal","Judicial"],     count:7,  lastFetch:"—" },
  { id:"uae-official",    name:"UAE Government Portal",       authority:"UAE Government",       tier:1, scope:"Federal",             url:"https://u.ae/en",                                               sectors:["All Sectors"],                    count:5,  lastFetch:"—" },
  { id:"cbuae",           name:"Central Bank (CBUAE)",        authority:"CBUAE",                tier:2, scope:"Federal — Finance",    url:"https://www.centralbank.ae/en/",                                sectors:["Banking","Insurance","Payments"],  count:9,  lastFetch:"—" },
  { id:"cma",             name:"Capital Market Authority",    authority:"CMA (fmr. SCA)",       tier:2, scope:"Federal — Markets",    url:"https://www.sca.gov.ae/en/",                                    sectors:["Securities","Virtual Assets"],     count:6,  lastFetch:"—" },
  { id:"mohre",           name:"MOHRE — Labour",              authority:"MOHRE",                tier:2, scope:"Federal — Labour",     url:"https://www.mohre.gov.ae/en/laws-and-regulations.aspx",         sectors:["Labour","Emiratisation"],          count:4,  lastFetch:"—" },
  { id:"moec",            name:"Ministry of Economy",         authority:"MoE",                  tier:2, scope:"Federal — Commercial", url:"https://www.moet.gov.ae/en/laws",                               sectors:["Commercial","Competition"],        count:8,  lastFetch:"—" },

// ===== HELPERS =====
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d){
  const m=Math.floor((Date.now()-new Date(d).getTime())/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function getFiltered(){
  return UPDATES.filter(u=>{
    if(S.filterSrc!=='all'&&u.source_id!==S.filterSrc)return false;
    if(S.filterImp!=='all'&&u.impact!==S.filterImp)return false;
    if(S.filterAmend&&!u.isAmend)return false;
    if(S.search){const q=S.search.toLowerCase();if(!u.title.toLowerCase().includes(q)&&!u.ref.toLowerCase().includes(q)&&!(u.summary||'').toLowerCase().includes(q))return false;}
    return true;
  });
}

// ===== LIVE FEED =====
async function fetchLiveNews(){
  S.liveLoading=true; patchLiveSection();
  const items=[],seen=new Set(),MAX_AGE=3*24*60*60*1000;
  for(const feed of LIVE_FEEDS){
    try{
      const rssUrl='https://news.google.com/rss/search?q=when:3d+'+feed.q+'&hl=en-US&gl=US&ceid=US:en';
      const res=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rssUrl));
      const data=await res.json();
      if(data.status==='ok'&&Array.isArray(data.items)){
        data.items.slice(0,4).forEach(item=>{
          const title=(item.title||'').replace(/ - [^-]+$/,'').trim();
          const key=title.toLowerCase().substring(0,55);
          if(seen.has(key)||title.length<20)return;
          if(item.pubDate&&(Date.now()-new Date(item.pubDate).getTime())>MAX_AGE)return;
          seen.add(key);
          items.push({title,link:item.link||'#',pubDate:item.pubDate||null,sector:feed.label});
        });
      }
    }catch(e){}
  }
  items.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
  S.liveItems=items; S.liveLoading=false;
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Dubai'});
  SOURCES.forEach(s=>s.lastFetch=now);
  patchLiveSection(); renderSidebar(); renderHeaderBadge();
}

function patchLiveSection(){
  const el=document.getElementById('liveFeedInner');if(!el)return;
  if(S.liveLoading){el.innerHTML='<div class="live-placeholder"><span class="spin">↺</span> Fetching from '+LIVE_FEEDS.length+' sources…</div>';return;}
  if(!S.liveItems.length){el.innerHTML='<div class="live-placeholder">No stories found in the last 3 days. Try refreshing.</div>';return;}
  el.innerHTML=S.liveItems.slice(0,15).map(item=>{
    const ago=item.pubDate?timeAgo(item.pubDate):'';
    return '<div class="live-item"><a href="'+esc(item.link)+'" target="_blank" rel="noreferrer">'+esc(item.title)+'</a>'
      +'<div class="live-item-meta"><span class="live-item-src">'+esc(item.sector)+'</span>'+(ago?' &middot; '+ago:'')+'</div></div>';
  }).join('');
}

// Related news for a specific sector
function getRelatedNews(sector, limit){
  const kw=sector.toLowerCase().replace(/[\/\s]+/g,'|');
  return S.liveItems.filter(i=>new RegExp(kw,'i').test(i.sector)||new RegExp(kw,'i').test(i.title)).slice(0,limit||5);
}

      </div>
    </div>
    <div class="section-sub-label">Key Updates — Curated</div>
    <div class="card-list" style="margin-bottom:28px;">
      ${filtered.map(u=>cardHtml(u,false)).join('')}
      ${filtered.length===0?'<div class="empty-state">No updates match the current filters.</div>':''}
    </div>
    <div class="live-section">
      <div class="live-section-hdr"><span class="live-dot-sm"></span>Live Legislative News — Last 3 Days (${LIVE_FEEDS.length} sources)</div>
      <div id="liveFeedInner"><div class="live-placeholder">Loading…</div></div>
    </div>`;
  patchLiveSection();
}

function renderSources(){
  document.getElementById('mainContent').innerHTML=`
    <div class="page-title" style="margin-bottom:6px;">Source Directory</div>
    <p style="font-size:12px;color:#4A6FA5;margin-bottom:24px;">All ${SOURCES.length} monitored official UAE legislation portals.</p>
    ${[1,2,3,4].map(tier=>{
      const srcs=SOURCES.filter(s=>s.tier===tier);
      const tc=TIER_COLORS_MAP[tier];
      return `<div class="tier-section">
        <div class="tier-header">
          <span class="tier-stripe" style="background:${tc}"></span>
          <span class="tier-label-txt" style="color:${tc}">${TIER_LABELS[tier]}</span>
        </div>
        <div class="source-grid">${srcs.map(s=>`
          <div class="source-card">
            <div class="source-card-top">
              <span class="tier-badge" style="background:${tc}22;color:${tc}">${TIER_LABELS[tier]}</span>
              <span class="update-count">${s.count} updates</span>
            </div>
            <div><div class="source-name">${esc(s.name)}</div><div class="source-scope">${esc(s.scope)}</div></div>
            <div class="sector-tags">${s.sectors.map(sec=>`<span class="sector-tag">${esc(sec)}</span>`).join('')}</div>
            <div class="source-footer">
              <span class="last-fetched">Fetched: ${esc(s.lastFetch)}</span>
              <a href="${esc(s.url)}" target="_blank" class="btn btn-outline btn-sm">Open Portal →</a>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

function renderSectors(){
  const filtered=getFiltered();
  let sectors=[...new Set(filtered.map(u=>u.sector))];
  if(S.filterSector!=='all') sectors=sectors.filter(s=>s===S.filterSector);
  document.getElementById('mainContent').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <div class="page-title">Updates by Sector</div>
      ${S.filterSector!=='all'?`<button onclick="selectSector('all')" style="background:#1E3A5F;border:none;color:#4B4BFF;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;cursor:pointer;">✕ ${esc(S.filterSector)}</button>`:''}
    </div>
    <p style="font-size:12px;color:#4A6FA5;margin-bottom:20px;">Click any card to view full details, deadlines and source links.</p>
    ${sectors.map(sector=>{
      const items=filtered.filter(u=>u.sector===sector);
      return `<div class="sector-group" id="sector-${esc(sector.replace(/\W+/g,'-'))}">
        <div class="sector-group-hdr">
          <span class="sector-group-title">${esc(sector)}</span>
          <span class="sector-count-badge">${items.length}</span>
        </div>
        <div class="card-list">${items.map(u=>cardHtml(u,true)).join('')}</div>
      </div>`;
    }).join('')}
    ${sectors.length===0?'<div class="empty-state">No updates match the current filters.</div>':''}`;
}

// ===== SECTOR DROPDOWN =====
function buildSectorDropdown(){
  const dd=document.getElementById('sectorDropdown');
  if(!dd)return;
  dd.innerHTML='<button class="nav-dropdown-item all" onclick="selectSector(\'all\')">📂 All Sectors</button>'
    +ALL_SECTORS.map(s=>`<button class="nav-dropdown-item" onclick="selectSector('${s.replace(/'/g,"\\'")}')"><span class="sector-dot"></span>${esc(s)}</button>`).join('');
}

window.toggleSectorDropdown=function(e){
  e.stopPropagation();
  const dd=document.getElementById('sectorDropdown');
  if(!dd)return;
  const open=dd.style.display==='block';
  dd.style.display=open?'none':'block';
  if(!open) buildSectorDropdown();
};

window.selectSector=function(sector){
  S.filterSector=sector;
  S.view='sectors';
  // Update nav button states
  ['Feed','Sources','Sectors'].forEach(id=>{
    const btn=document.getElementById('btn'+id);
    if(btn)btn.className='nav-btn'+(id==='Sectors'?' active':'');
  });
  // Close dropdown
  const dd=document.getElementById('sectorDropdown');
  if(dd)dd.style.display='none';
  renderContent();
  // Scroll to top of content
  const c=document.getElementById('mainContent');
  if(c)c.scrollTop=0;
};

// Close dropdown when clicking outside
document.addEventListener('click',()=>{
  const dd=document.getElementById('sectorDropdown');
  if(dd)dd.style.display='none';
});

function renderContent(){
  if(S.view==='feed')renderFeed();
  else if(S.view==='sources')renderSources();
  else if(S.view==='sectors')renderSectors();
  renderSidebar();
}

// ===== SIDEBAR =====
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  if(sb)sb.style.display=S.view==='sources'?'none':'';
  const srcEl=document.getElementById('sourceFilters');
  if(srcEl)srcEl.innerHTML=SOURCES.map(s=>
    `<button class="filter-btn${S.filterSrc===s.id?' active':''}" onclick="setFilter('src','${s.id}')" title="${esc(s.name)}">${esc(s.name)}</button>`
  ).join('');
  const srcAll=document.getElementById('srcAll');
  if(srcAll)srcAll.className='filter-btn'+(S.filterSrc==='all'?' active':'');
  ['all','High','Medium','Low'].forEach(v=>{
    const el=document.getElementById('imp'+(v==='all'?'All':v));
    if(el)el.className='filter-btn'+(S.filterImp===v?' active':'');
  });
  const amendEl=document.getElementById('amendFilter');
  if(amendEl)amendEl.checked=S.filterAmend;
  const statsEl=document.getElementById('quickStats');
  if(statsEl){
    const f=getFiltered();
    const unread=UPDATES.filter(u=>!u.isRead).length;
    statsEl.innerHTML=[
      ['Total Updates',UPDATES.length],['Filtered',f.length],['Unread',unread],
      ['High Impact',UPDATES.filter(u=>u.impact==='High').length],
      ['Amendments',UPDATES.filter(u=>u.isAmend).length],
      ['Live Stories',S.liveItems.length],
    ].map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-value">${v}</span></div>`).join('');
  }
}

function renderHeaderBadge(){
  const unread=UPDATES.filter(u=>!u.isRead).length;
  const b=document.getElementById('unreadBadge');
  if(b){b.style.display=unread>0?'inline-block':'none';b.textContent=unread+' unread · mark all read';}
}

// ===== CONTROLS =====
window.setView=function(v){
  S.view=v;
  if(v==='sectors') S.filterSector='all'; // reset sector filter on direct nav click
  ['feed','sources','sectors'].forEach(id=>{
    const btn=document.getElementById('btn'+id.charAt(0).toUpperCase()+id.slice(1));
    if(btn)btn.className='nav-btn'+(id===v?' active':'');
  });
  renderContent();
};
window.setFilter=function(key,val){
  if(key==='src')S.filterSrc=val;
  if(key==='imp')S.filterImp=val;
  if(key==='amend')S.filterAmend=val;
  renderContent();
};
window.onSearch=function(val){S.search=val;renderContent();};
window.markAllRead=function(){
  UPDATES.forEach(u=>{u.isRead=true;localStorage.setItem('lr3_'+u.id,'1');});
  renderContent();renderHeaderBadge();
};
window.triggerRefresh=async function(){
  const btn=document.getElementById('refreshBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin">↺</span> Refreshing…';}
  S.countdown=1800;
  await fetchLiveNews();
  if(btn){btn.disabled=false;btn.innerHTML='↺ Refresh Now';}
};

// ===== COUNTDOWN =====
setInterval(()=>{
  S.countdown=S.countdown>0?S.countdown-1:0;
  if(S.countdown===0){S.countdown=1800;fetchLiveNews();}
  const mins=String(Math.floor(S.countdown/60)).padStart(2,'0');
  const secs=String(S.countdown%60).padStart(2,'0');
  const el=document.getElementById('countdownTxt');if(el)el.textContent='Next: '+mins+':'+secs;
  const dot=document.getElementById('liveDot');if(dot)dot.className='live-dot '+(S.countdown<1500?'stale':'fresh');
},1000);

// ===== INIT =====
renderContent();
renderHeaderBadge();
fetchLiveNews();
</script>
</body>
</html>
